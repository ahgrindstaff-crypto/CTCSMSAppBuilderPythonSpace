<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Space Commander - Stable Build</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0b0d17; color: #cfd8dc; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #1a237e; color: #fff; padding: 15px; border-bottom: 2px solid #3949ab; display: flex; justify-content: space-between; align-items: center; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .editor-side, .output-side { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        textarea { flex: 1; font-family: 'Consolas', monospace; font-size: 16px; padding: 15px; border: 2px solid #3949ab; border-radius: 4px; background: #1c1c1c; color: #00ff41; resize: none; outline: none; }
        #console { flex: 1; background: #000; color: #00ff41; font-family: 'Consolas', monospace; padding: 15px; overflow-y: auto; border: 1px solid #333; white-space: pre-wrap; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; font-size: 16px; cursor: pointer; border: none; color: white; font-weight: bold; border-radius: 4px; }
        #runBtn { background: #1b5e20; }
        #runBtn:hover { background: #2e7d32; }
        #nextBtn { background: #0277bd; display: none; }
        .level-hint { background: #263238; padding: 15px; border-left: 5px solid #0277bd; margin-bottom: 15px; color: #eceff1; min-height: 80px;}
        code { background: #37474f; padding: 2px 5px; color: #ffab40; border-radius: 3px; }
        .success { color: #4caf50; font-weight: bold; }
        .error { color: #f44336; }
    </style>
</head>
<body>

<header>
    <h1 id="levelTitle" style="margin:0; font-size: 24px;">Mission Control: Level 1</h1>
    <div id="progress">Python Level 1 of 25</div>
</header>

<div class="container">
    <div class="editor-side">
        <div class="level-hint">
            <strong id="taskTitle">Current Task:</strong>
            <div id="instructions">Create a variable <code>ship_name</code> and set it to <code>"Apollo"</code>.</div>
        </div>
        <textarea id="codeEditor" spellcheck="false" placeholder="# Write your Python code here..."></textarea>
        <div class="controls">
            <button id="runBtn" onclick="processCode()">Initiate Launch (Run)</button>
            <button id="nextBtn" onclick="nextLevel()">Next Level →</button>
        </div>
    </div>

    <div class="output-side">
        <h3>Terminal Output:</h3>
        <div id="console">System Ready... Waiting for input.</div>
    </div>
</div>

<script>
    let currentLevel = 1;
    // We'll store simulated Python variables here
    let pyStorage = {};

    const levels = [
        { task: "Set the ship name: <code>ship_name = \"Apollo\"</code>", check: /ship_name\s*=\s*["']Apollo["']/, successMsg: "Ship name registered: Apollo" },
        { task: "Set the destination: <code>destination = \"Mars\"</code>", check: /destination\s*=\s*["']Mars["']/, successMsg: "Trajectory set for Mars." },
        { task: "Print the ship name: <code>print(ship_name)</code>", check: /print\s*\(\s*ship_name\s*\)/, successMsg: "Apollo" },
        { task: "Print the destination: <code>print(destination)</code>", check: /print\s*\(\s*destination\s*\)/, successMsg: "Mars" },
        { task: "Set fuel level to 100: <code>fuel = 100</code>", check: /fuel\s*=\s*100/, successMsg: "Fuel tanks at 100%." },
        { task: "Set crew count to 3: <code>crew = 3</code>", check: /crew\s*=\s*3/, successMsg: "Life support active for 3 crew members." },
        { task: "Set distance to 0: <code>distance = 0</code>", check: /distance\s*=\s*0/, successMsg: "Odometer reset." },
        { task: "Print message: <code>print(\"Engines Warming Up...\")</code>", check: /print\s*\(\s*["']Engines Warming Up...["']\s*\)/, successMsg: "Engines Warming Up..." },
        { task: "Update distance: <code>distance = distance + 500</code>", check: /distance\s*=\s*distance\s*\+\s*500/, successMsg: "Distance updated: 500ly" },
        { task: "Decrease fuel: <code>fuel = fuel - 10</code>", check: /fuel\s*=\s*fuel\s*-\s*10/, successMsg: "Fuel consumption recorded. Current: 90%" },
        { task: "Print new distance: <code>print(distance)</code>", check: /print\s*\(\s*distance\s*\)/, successMsg: "500" },
        { task: "Print new fuel: <code>print(fuel)</code>", check: /print\s*\(\s*fuel\s*\)/, successMsg: "90" },
        { task: "Create an IF: <code>if fuel > 50:</code>", check: /if\s+fuel\s*>\s*50\s*:/, successMsg: "Conditional logic parsed..." },
        { task: "Inside the IF, print: <code>print(\"Fuel levels good!\")</code>", check: /print\s*\(\s*["']Fuel levels good!["']\s*\)/, successMsg: "Fuel levels good!" },
        { task: "Add an ELSE: <code>else:</code>", check: /else\s*:/, successMsg: "Alternate path defined." },
        { task: "Inside ELSE, print: <code>print(\"Low fuel warning!\")</code>", check: /print\s*\(\s*["']Low fuel warning!["']\s*\)/, successMsg: "Low fuel warning!" },
        { task: "Create cargo list: <code>food_types = [\"Apples\", \"Steak\"]</code>", check: /food_types\s*=\s*\[.*\]/, successMsg: "Inventory logged." },
        { task: "Add to the list: <code>food_types.append(\"Water\")</code>", check: /\.append\s*\(/, successMsg: "Water added to storage." },
        { task: "Print the list: <code>print(food_types)</code>", check: /print\s*\(\s*food_types\s*\)/, successMsg: "['Apples', 'Steak', 'Water']" },
        { task: "Check crew size: <code>if crew == 3:</code>", check: /if\s+crew\s*==\s*3\s*:/, successMsg: "Verifying crew count..." },
        { task: "Inside, print: <code>print(\"All crew present.\")</code>", check: /print\s*\(\s*["']All crew present\.["']\s*\)/, successMsg: "All crew present." },
        { task: "Create a boolean: <code>in_orbit = True</code>", check: /in_orbit\s*=\s*True/, successMsg: "Orbit status: Confirmed." },
        { task: "If in_orbit is True, print: <code>print(\"Orbit achieved!\")</code>", check: /print\s*\(\s*["']Orbit achieved!["']\s*\)/, successMsg: "Orbit achieved!" },
        { task: "Update ship name: <code>ship_name = \"USS [YourName]\"</code>", check: /ship_name\s*=\s*["']USS.*["']/, successMsg: "Registry updated." },
        { task: "Final Print: <code>print(\"Mission Accomplished!\")</code>", check: /print\s*\(\s*["']Mission Accomplished!["']\s*\)/, successMsg: "MISSION ACCOMPLISHED!" }
    ];

    function processCode() {
        const code = document.getElementById('codeEditor').value;
        const consoleEl = document.getElementById('console');
        const level = levels[currentLevel - 1];

        consoleEl.innerText = "> Running script...\n";

        // Regex Validation (Simulating Python behavior)
        if (level.check.test(code)) {
            consoleEl.innerHTML += `<span class="success">${level.successMsg}</span>`;
            consoleEl.innerHTML += "\n\n✅ [MISSION CLEAR] Requirement Met.";
            document.getElementById('nextBtn').style.display = "block";
        } else {
            consoleEl.innerHTML += `<span class="error">PYTHON ERROR: Syntax error or mission requirement not met.\nCheck your spelling and spacing!</span>`;
        }
    }

    function nextLevel() {
        if (currentLevel < levels.length) {
            currentLevel++;
            document.getElementById('levelTitle').innerText = "Mission Control: Level " + currentLevel;
            document.getElementById('progress').innerText = "Python Level " + currentLevel + " of 25";
            document.getElementById('instructions').innerHTML = levels[currentLevel-1].task;
            document.getElementById('nextBtn').style.display = "none";
            document.getElementById('console').innerText = "Initializing Level " + currentLevel + "...";
            document.getElementById('codeEditor').value = ""; 
        } else {
            alert("Commander, you've reached the edge of the galaxy! Challenge Complete!");
        }
    }
</script>

</body>
</html>
